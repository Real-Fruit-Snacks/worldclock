<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>World Clock</title>
<meta name="description" content="Offline world clock — timezones, day/night map, no network required.">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2016%2016'%3E%3Crect%20width='16'%20height='16'%20rx='3'%20fill='%23090c0d'/%3E%3Cpath%20d='M3.5%2014.5%20V7%20Q3.5%202.5%208%202.5%20Q12.5%202.5%2012.5%207%20V14.5%20L11%2013.3%20L9.5%2014.5%20L8%2013.3%20L6.5%2014.5%20L5%2013.3%20Z'%20fill='%2363f2ab'/%3E%3Crect%20x='6'%20y='6.5'%20width='1.4'%20height='2.4'%20fill='%23090c0d'/%3E%3Crect%20x='8.8'%20y='6.5'%20width='1.4'%20height='2.4'%20fill='%23090c0d'/%3E%3C/svg%3E">
<script>(function(){try{
var t=localStorage.getItem("wc-theme");
if(t==="light"||t==="dark")document.documentElement.setAttribute("data-theme",t);
var a=localStorage.getItem("wc-accent");
if(a&&"12345".indexOf(a)>-1)document.documentElement.setAttribute("data-accent",a);
var pm=localStorage.getItem("wc-pet");
if(pm!=="cursor")document.documentElement.setAttribute("data-pet",pm==="off"?"off":"float");
var ps=parseInt(localStorage.getItem("wc-pet-size"),10);
if(ps>=16&&ps<=64)document.documentElement.style.setProperty("--pet-size",ps+"px");
var po=parseInt(localStorage.getItem("wc-pet-opacity"),10);
if(po>=15&&po<=100)document.documentElement.style.setProperty("--pet-base-opacity",(po/100).toFixed(3));
}catch(e){}})();</script>
<link rel="stylesheet" href="css/tokens.css">
<link rel="stylesheet" href="css/site.css">
</head>
<body>
<header class="topbar">
  <span class="manifest-label site-title">WORLD CLOCK</span>
  <span class="topbar-utc"><span class="manifest-label">UTC</span> <span id="utc-clock" class="mono">--:--:--</span></span>
  <span class="topbar-actions">
    <button id="btn-add" class="icon-btn" title="Add timezone" aria-label="Add timezone">
      <svg viewBox="0 0 16 16" width="16" height="16" aria-hidden="true"><path d="M8 3v10M3 8h10" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
    </button>
    <button id="btn-settings" class="icon-btn" title="Settings" aria-label="Settings">
      <svg viewBox="0 0 16 16" width="16" height="16" aria-hidden="true"><circle cx="8" cy="8" r="2.2" stroke="currentColor" stroke-width="1.4" fill="none"/><path d="M8 1.5v2M8 12.5v2M1.5 8h2M12.5 8h2M3.4 3.4l1.4 1.4M11.2 11.2l1.4 1.4M12.6 3.4l-1.4 1.4M4.8 11.2l-1.4 1.4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
    </button>
    <button id="btn-theme" class="icon-btn" title="Toggle theme" aria-label="Toggle theme">
      <svg viewBox="0 0 16 16" width="16" height="16" aria-hidden="true"><path d="M13 9.5A5.5 5.5 0 1 1 6.5 3 4.5 4.5 0 0 0 13 9.5Z" stroke="currentColor" stroke-width="1.4" fill="none" stroke-linejoin="round"/></svg>
    </button>
  </span>
</header>
<main>
  <section id="map-panel" class="panel map-panel" aria-label="World map">
    <div class="panel-header"><span class="manifest-label">DAY / NIGHT</span><span id="map-sun-info" class="manifest-label"></span></div>
    <div id="map-host"></div>
  </section>
  <section id="clock-grid" class="clock-grid" aria-label="Clocks"></section>
</main>
<footer class="footer">
  <span class="mono">all times computed locally &middot; no network required</span>
  <a class="mono" href="https://github.com/Real-Fruit-Snacks" rel="noopener">source</a>
</footer>
<div id="site-pet" aria-hidden="true"><div class="pet-tilt"><div class="pet-sprite" title="pet the ghost to recolor it"><svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg"><path class="pet-body" d="M2 16 V7 Q2 1 8 1 Q14 1 14 7 V16 L12 14.4 L10 16 L8 14.4 L6 16 L4 14.4 Z"/><g class="pet-eyes-open"><rect x="5" y="6" width="2" height="3"/><rect x="9" y="6" width="2" height="3"/></g><g class="pet-eyes-closed"><rect x="5" y="8" width="2" height="1"/><rect x="9" y="8" width="2" height="1"/></g><g class="pet-eyes-happy"><path d="M4.6 8 L6 6.6 L7.4 8"/><path d="M8.6 8 L10 6.6 L11.4 8"/></g></svg></div></div></div>
<script src="js/zones.js"></script>
<script src="js/data.js"></script>
<script src="js/settings.js"></script>
<script src="js/clocks.js"></script>
<script src="js/mapdata.js"></script>
<script src="js/map.js"></script>
<script src="js/pet.js"></script>
</body>
</html>
