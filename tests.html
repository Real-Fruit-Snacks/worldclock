<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>worldclock tests</title>
<link rel="stylesheet" href="css/tokens.css">
<style>
body { background: var(--twb-bg-0); color: var(--twb-text-normal);
  font-family: var(--twb-font-mono); font-size: 13px; padding: 16px; }
#summary { font-size: 16px; font-weight: 700; margin-bottom: 12px; }
.pass { color: var(--twb-accent); } .fail { color: var(--twb-red); }
div { margin: 2px 0; }
</style>
</head>
<body>
<div id="summary">running…</div>
<div id="log"></div>
<script src="js/zones.js"></script>
<script src="js/data.js"></script>
<script src="js/settings.js"></script>
<script src="js/clocks.js"></script>
<script src="js/mapdata.js"></script>
<script src="js/map.js"></script>
<script src="js/qol.js"></script>
<script>
var _tests = [], _pass = 0, _fail = 0;
function T(name, fn) { _tests.push([name, fn]); }
function log(cls, msg) {
  var d = document.createElement("div");
  d.className = cls; d.textContent = msg;
  document.getElementById("log").appendChild(d);
}
function assert(cond, msg) {
  if (cond) { _pass++; }
  else { _fail++; log("fail", "FAIL: " + msg); }
}
function assertEq(a, b, msg) {
  assert(a === b, msg + " (got " + JSON.stringify(a) + ", want " + JSON.stringify(b) + ")");
}
function approx(a, b, tol) { return Math.abs(a - b) <= tol; }
window.addEventListener("load", function () {
  for (var i = 0; i < _tests.length; i++) {
    try { _tests[i][1](); }
    catch (e) { _fail++; log("fail", "ERROR in " + _tests[i][0] + ": " + e.message); }
  }
  var s = document.getElementById("summary");
  s.textContent = "PASS " + _pass + " / FAIL " + _fail;
  s.className = _fail ? "fail" : "pass";
});
/* === tests === */
T("harness sanity", function () {
  assert(true, "true is true");
  assert(approx(1.05, 1.0, 0.1), "approx works");
});
T("zones table", function () {
  assert(typeof WC === "object", "WC namespace exists");
  var n = Object.keys(WC.ZONES).length;
  assert(n > 300, "zone table has >300 entries, got " + n);
  var ny = WC.ZONES["America/New_York"];
  assert(ny && approx(ny[0], 40.71, 0.3) && approx(ny[1], -74.01, 0.3),
    "New York coords ~ (40.71, -74.01), got " + JSON.stringify(ny));
  var tk = WC.ZONES["Asia/Tokyo"];
  assert(tk && approx(tk[0], 35.65, 0.3) && approx(tk[1], 139.74, 0.3),
    "Tokyo coords ~ (35.65, 139.74), got " + JSON.stringify(tk));
});
T("aliases and curated", function () {
  assertEq(WC.ALIASES["nyc"], "America/New_York", "nyc alias");
  assertEq(WC.ALIASES["la"], "America/Los_Angeles", "la alias");
  for (var i = 0; i < WC.SUGGESTED.length; i++) {
    var z = WC.SUGGESTED[i];
    assert(z === "UTC" || WC.ZONES[z], "suggested zone in table: " + z);
  }
  assert(WC.DEFAULT_ZONES.indexOf("UTC") > -1, "defaults include UTC");
  assertEq(WC.cityName("America/New_York"), "New York", "cityName strips region + underscores");
  assertEq(WC.cityName("UTC"), "UTC", "cityName passes UTC through");
  assert(WC.allZones().length >= Object.keys(WC.ZONES).length - 5, "allZones covers table");
});
T("time parts", function () {
  var d = new Date(Date.UTC(2026, 0, 15, 12, 0, 0)); /* 2026-01-15T12:00Z */
  var p = WC.time.parts(d, "Asia/Tokyo");
  assertEq(p.hh, "21", "Tokyo hour at noon UTC in January");
  assertEq(p.mm, "00", "Tokyo minutes");
  assert(p.abbr === "JST" || /GMT\+9/.test(p.abbr), "Tokyo abbreviation (got " + JSON.stringify(p.abbr) + ")");
  var q = WC.time.parts(d, "America/New_York");
  assertEq(q.hh, "07", "New York hour (EST)");
  assertEq(q.weekday, "Thu", "weekday in zone");
  var u = WC.time.parts(new Date(Date.UTC(2026, 6, 10, 0, 30, 5)), "UTC");
  assertEq(u.hh + ":" + u.mm + ":" + u.ss, "00:30:05", "UTC midnight formats as 00, padded");
});
T("offsets", function () {
  var jan = new Date(Date.UTC(2026, 0, 15, 12, 0, 0));
  var jul = new Date(Date.UTC(2026, 6, 10, 12, 0, 0));
  assertEq(WC.time.offsetMinutes(jan, "Asia/Tokyo"), 540, "Tokyo +540");
  assertEq(WC.time.offsetMinutes(jan, "America/New_York"), -300, "NY winter -300");
  assertEq(WC.time.offsetMinutes(jul, "America/New_York"), -240, "NY summer -240 (DST)");
  assertEq(WC.time.offsetMinutes(jan, "Asia/Kolkata"), 330, "Kolkata +330");
  assertEq(WC.time.offsetMinutes(jan, "UTC"), 0, "UTC 0");
  assertEq(WC.time.offsetLabel(540), "UTC+9", "label +9");
  assertEq(WC.time.offsetLabel(-240), "UTC-4", "label -4");
  assertEq(WC.time.offsetLabel(330), "UTC+5.5", "label +5.5");
  assertEq(WC.time.offsetLabel(0), "UTC±0", "label zero");
});
T("home delta", function () {
  var d = new Date(Date.UTC(2026, 6, 10, 3, 0, 0)); /* 03:00Z Jul 10 */
  var r = WC.time.homeDelta(d, "America/New_York", "Asia/Tokyo");
  assertEq(r.label, "-13h", "NY seen from Tokyo is -13h in July");
  assertEq(r.dayRel, "yesterday", "NY is on yesterday at 03:00Z");
  var r2 = WC.time.homeDelta(d, "Asia/Tokyo", "America/New_York");
  assertEq(r2.label, "+13h", "Tokyo seen from NY");
  assertEq(r2.dayRel, "tomorrow", "Tokyo on tomorrow");
  var r3 = WC.time.homeDelta(d, "Asia/Kolkata", "UTC");
  assertEq(r3.label, "+5.5h", "half-hour zone");
  var r4 = WC.time.homeDelta(d, "UTC", "UTC");
  assertEq(r4.label, "±0h", "same zone");
  assertEq(r4.dayRel, "today", "same zone today");
  var base = Date.UTC(2026, 0, 15, 12, 0, 0);
  var ref = new Date(base);
  var r5 = WC.time.homeDelta(new Date(base + 86400000), "UTC", "UTC", ref);
  assertEq(r5.dayRel, "tomorrow", "scrubbed +24h vs real ref is tomorrow");
  var r6 = WC.time.homeDelta(new Date(base - 86400000), "UTC", "UTC", ref);
  assertEq(r6.dayRel, "yesterday", "scrubbed -24h vs real ref is yesterday");
  var r7 = WC.time.homeDelta(new Date(base + 2 * 86400000), "UTC", "UTC", ref);
  assertEq(r7.dayRel, "+2d", "two days out labels +2d");
  var r8 = WC.time.homeDelta(new Date(base), "UTC", "UTC", ref);
  assertEq(r8.dayRel, "today", "same instant still today");
});
T("12h conversion", function () {
  assertEq(WC.time.format12(0).h12, 12, "0 -> 12 AM");
  assertEq(WC.time.format12(0).ampm, "AM", "0 is AM");
  assertEq(WC.time.format12(12).h12, 12, "12 -> 12 PM");
  assertEq(WC.time.format12(12).ampm, "PM", "12 is PM");
  assertEq(WC.time.format12(15).h12, 3, "15 -> 3");
});
T("solar position", function () {
  var solstice = new Date(Date.UTC(2026, 5, 21, 12, 0, 0));
  var equinox = new Date(Date.UTC(2026, 2, 20, 12, 0, 0));
  assert(approx(WC.sun.declination(solstice), 23.43, 0.5),
    "June solstice declination ~23.43, got " + WC.sun.declination(solstice));
  assert(approx(WC.sun.declination(equinox), 0, 1.0),
    "March equinox declination ~0, got " + WC.sun.declination(equinox));
  var ss = WC.sun.subsolar(solstice);
  assert(approx(ss.lon, 0, 3), "subsolar lon ~0 at 12:00 UTC, got " + ss.lon);
  assert(approx(ss.lat, 23.43, 0.5), "subsolar lat = declination");
  var elHigh = WC.sun.elevation(ss.lat, ss.lon, solstice);
  assert(approx(elHigh, 90, 1), "elevation ~90 at subsolar point, got " + elHigh);
  var elLow = WC.sun.elevation(-ss.lat, ss.lon + 180, solstice);
  assert(approx(elLow, -90, 1), "elevation ~-90 at antipode, got " + elLow);
});
T("map data", function () {
  assert(typeof WC.MAP_PATH === "string" && WC.MAP_PATH.length > 10000,
    "MAP_PATH present and substantial");
  assert(WC.MAP_PATH.charAt(0) === "M", "path starts with M");
  assert(WC.MAP_PATH.indexOf("Z") > -1, "path has closed rings");
});
T("prefs round-trip", function () {
  WC.prefs.set("wc-test-key", "hello");
  assertEq(WC.prefs.get("wc-test-key", "x"), "hello", "set then get");
  WC.prefs.remove("wc-test-key");
  assertEq(WC.prefs.get("wc-test-key", "fallback"), "fallback", "removed -> default");
});
T("zone search", function () {
  var r = WC.search("nyc");
  assert(r.length > 0 && r[0].zone === "America/New_York", "alias nyc -> New_York first");
  r = WC.search("tok");
  assert(r.some(function (m) { return m.zone === "Asia/Tokyo"; }), "prefix tok finds Tokyo");
  r = WC.search("LONDON");
  assert(r.some(function (m) { return m.zone === "Europe/London"; }), "case-insensitive");
  r = WC.search("kolk");
  assert(r.some(function (m) { return m.zone === "Asia/Kolkata"; }), "kolk finds Kolkata");
  assertEq(WC.search("zzzznothing").length, 0, "no junk matches");
});
T("map has no antimeridian chords", function () {
  var nums = WC.MAP_PATH.match(/[ML](\d+\.?\d*) (\d+\.?\d*)/g);
  var prevX = null, chords = 0;
  for (var i = 0; i < nums.length; i++) {
    var isMove = nums[i].charAt(0) === "M";
    var x = parseFloat(nums[i].slice(1));
    if (!isMove && prevX !== null && Math.abs(x - prevX) > 400) chords++;
    prevX = x;
  }
  assertEq(chords, 0, "no full-width horizontal chords in land path");
});
T("scrub core", function () {
  assertEq(WC.scrub.minutes, 0, "scrub starts at 0");
  var real = Date.now();
  WC.setScrub(120);
  assert(Math.abs(WC.now().getTime() - real - 120 * 60000) < 2000, "WC.now shifted +2h");
  WC.setScrub(99999);
  assertEq(WC.scrub.minutes, 1440, "clamped to +1440");
  WC.setScrub(-99999);
  assertEq(WC.scrub.minutes, -1440, "clamped to -1440");
  WC.setScrub(0);
  assertEq(WC.scrub.minutes, 0, "reset");
  assert(Math.abs(WC.now().getTime() - Date.now()) < 2000, "WC.now == now at 0");
});
T("scrub label", function () {
  assertEq(WC.scrubLabel(0), "NOW", "zero is NOW");
  assertEq(WC.scrubLabel(180), "+3H", "whole hours");
  assertEq(WC.scrubLabel(-45), "-45M", "minutes only");
  assertEq(WC.scrubLabel(210), "+3H30M", "mixed");
  assertEq(WC.scrubLabel(-1440), "-24H", "full day");
});
T("sort by time", function () {
  var d = new Date(Date.UTC(2026, 0, 15, 12, 0, 0));
  var out = WC.sortZonesByTime(["Asia/Tokyo", "Europe/London", "America/New_York"], d);
  assertEq(out.join("|"), "America/New_York|Europe/London|Asia/Tokyo", "west to east in January");
  assertEq(["Asia/Tokyo", "Europe/London"].join("|"), "Asia/Tokyo|Europe/London", "input not mutated check baseline");
  var src = ["Asia/Tokyo", "Europe/London"];
  WC.sortZonesByTime(src, d);
  assertEq(src.join("|"), "Asia/Tokyo|Europe/London", "input array not mutated");
});
T("share hash codec", function () {
  var h = WC.share.encode(["Asia/Tokyo", "America/New_York"], "Europe/London");
  assertEq(h, "#z=Asia%2FTokyo,America%2FNew_York&h=Europe%2FLondon", "encode");
  var back = WC.share.decode(h);
  assertEq(back.zones.join("|"), "Asia/Tokyo|America/New_York", "decode zones");
  assertEq(back.home, "Europe/London", "decode home");
  var junk = WC.share.decode("#z=Asia%2FTokyo,Not%2FAZone");
  assertEq(junk.zones.join("|"), "Asia/Tokyo", "invalid zones dropped");
  assertEq(WC.share.decode("#foo=bar"), null, "no z= -> null");
  assertEq(WC.share.decode(""), null, "empty -> null");
  assertEq(WC.share.decode("#z=%").zones.length, 0, "malformed percent yields no zones, no throw");
  assertEq(WC.share.decode("#z=Asia%2FTokyo,%").zones.join("|"), "Asia/Tokyo", "good zones survive a bad component");
});
T("nicknames", function () {
  WC.names.set("Asia/Tokyo", "  HQ  ");
  assertEq(WC.names.get("Asia/Tokyo"), "HQ", "set trims and stores");
  assertEq(WC.names.display("Asia/Tokyo"), "HQ", "display prefers nickname");
  WC.names.set("Asia/Tokyo", "");
  assertEq(WC.names.get("Asia/Tokyo"), null, "empty removes");
  assertEq(WC.names.display("Asia/Tokyo"), "Tokyo", "display falls back to city");
  assertEq(WC.names.display("UTC"), "UTC", "UTC passthrough");
  WC.names.set("Asia/Tokyo", '<b>"x"</b>');
  assertEq(WC.names.get("Asia/Tokyo"), '<b>"x"</b>', "raw value stored untouched");
  WC.names.set("Asia/Tokyo", "");
  assertEq(WC.prefs.get("wc-names", null), null, "empty names removes the key");
  WC.prefs.remove("wc-names");
});
T("nearest zone snap", function () {
  assertEq(WC.nearestZone(35.65, 139.74).zone, "Asia/Tokyo", "Tokyo coords snap to Tokyo");
  assertEq(WC.nearestZone(41, -75).zone, "America/New_York", "upstate PA snaps to New York");
  var mid = WC.nearestZone(0, -30);
  /* deviation from brief: actual nearest zone is America/Noronha at ~4.55 deg
     (brief assumed >5 deg; this repo's ZONES includes that Atlantic island
     city, so the real distance is smaller). Threshold lowered to match
     verified ground truth while still asserting real separation. */
  assert(!!mid && typeof mid.zone === "string" && mid.deg > 4, "open ocean returns a real zone with distance");
});
T("delta label", function () {
  assertEq(WC.time.deltaLabel(0), "±0h", "zero");
  assertEq(WC.time.deltaLabel(540), "+9h", "+9h");
  assertEq(WC.time.deltaLabel(-210), "-3.5h", "-3.5h");
  var d = new Date(Date.UTC(2026, 0, 15, 12, 0, 0));
  assertEq(WC.time.homeDelta(d, "Asia/Tokyo", "America/New_York").label, WC.time.deltaLabel(840), "homeDelta uses deltaLabel");
});
T("connector label", function () {
  var d = new Date(Date.UTC(2026, 0, 15, 12, 0, 0));
  var r = WC.connLabel("Asia/Tokyo", "America/Denver", d);
  assertEq(r.left, "America/Denver", "Denver is west of Tokyo");
  assertEq(r.text, "DENVER +16H TOKYO", "text reads left to right (Jan: MST-7 to JST+9)");
  assertEq(r.compact, "+16H", "compact form");
  assertEq(r.flow, 1, "time flows toward the later (right) zone");
  var s = WC.connLabel("Australia/Sydney", "Europe/London", d);
  assertEq(s.left, "Europe/London", "London west of Sydney");
  assertEq(s.flow, 1, "Sydney later in January");
  var u = WC.connLabel("UTC", "Etc/GMT", d);
  assertEq(u.flow, 0, "equal zones do not flow");
});
</script>
</body>
</html>
